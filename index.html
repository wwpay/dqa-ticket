<!DOCTYPE html>
<html lang="ko">
<head>
<!--
  수정: 2026-06-28 17:00 — btn-wjira-link 제거, ticket-id-wrap flex:1
-->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DQA Ticket Manager</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
</head>
<body>

<!-- ─── 상단 바 ─────────────────────────────────────────────────────────── -->
<header class="topbar">
  <h1 class="app-title" data-i18n="app_title">DQA Ticket Manager</h1>
  <div class="topbar-right">
    <input id="search-input" type="text" class="search-input" data-i18n-placeholder="search_placeholder" placeholder="검색...">
    <div class="lang-dropdown">
      <button type="button" class="lang-dropdown-btn" id="lang-dropdown-btn"></button>
      <div class="lang-dropdown-menu" id="lang-dropdown-menu">
        <button type="button" class="lang-option" data-lang="ko"><span class="fi fi-kr"></span> 한국어</button>
        <button type="button" class="lang-option" data-lang="jp"><span class="fi fi-jp"></span> 日本語</button>
        <button type="button" class="lang-option" data-lang="en"><span class="fi fi-gb"></span> English</button>
        <button type="button" class="lang-option" data-lang="vi"><span class="fi fi-vn"></span> Tiếng Việt</button>
      </div>
    </div>
    <button id="btn-new" class="btn btn-primary" data-i18n="new_ticket">티켓 등록</button>
  </div>
</header>

<!-- ─── 실시순서 충돌 확인 모달 ────────────────────────────────────────── -->
<div id="cascade-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <p id="cascade-msg" class="modal-msg"></p>
    <label class="modal-skip-label">
      <input type="checkbox" id="cascade-skip-today">
      오늘 그만 보기
    </label>
    <div class="modal-actions">
      <button id="cascade-cancel" class="btn btn-secondary">취소</button>
      <button id="cascade-ok" class="btn btn-primary">확인</button>
    </div>
  </div>
</div>

<!-- ─── 로딩 오버레이 ───────────────────────────────────────────────────── -->
<div id="loading" class="detail-loading-overlay" style="display:flex">
  <div class="spinner"></div>
  <span class="detail-loading-text" data-i18n="loading">로딩 중...</span>
</div>

<!-- ─── 에러 메시지 ────────────────────────────────────────────────────── -->
<div id="error-msg" class="error-msg" style="display:none">
  <span class="error-text"></span>
  <button class="btn btn-secondary" onclick="loadTickets()" data-i18n="btn_retry">재시도</button>
</div>

<!-- ─── 좌우 분할 레이아웃 ─────────────────────────────────────────────── -->
<div class="layout">

<!-- 왼쪽: 버전 사이드탭 -->
<aside class="version-sidebar">
  <div class="version-list" id="version-list"></div>
  <div class="version-add">
    <button type="button" class="btn-add-version" onclick="location.href='versions.html'">버전 관리</button>
  </div>
</aside>

<!-- 오른쪽: 메인 콘텐츠 -->
<main class="main-content">

  <!-- 섹션 1: WW -->
  <section class="ticket-section section-ww">
    <div class="section-header collapsible" id="section-ww-header">
      <span class="toggle-icon" id="toggle-activeWW">▼</span>
      <span>🔵</span>
      <span data-i18n="section_activeWW">WW</span>
      <span class="count-badge" id="count-activeWW">0</span>
    </div>
    <div id="section-activeWW-body">
      <div class="table-scroll">
        <table class="ticket-table">
          <colgroup class="ticket-cols"></colgroup>
          <thead><tr id="thead-ww"></tr></thead>
          <tbody id="tbody-activeWW"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- 섹션 2: MVN -->
  <section class="ticket-section section-mvn">
    <div class="section-header collapsible" id="section-mvn-header">
      <span class="toggle-icon" id="toggle-activeMVN">▼</span>
      <span>🟢</span>
      <span data-i18n="section_activeMVN">MVN</span>
      <span class="count-badge" id="count-activeMVN">0</span>
    </div>
    <div id="section-activeMVN-body">
      <div class="table-scroll">
        <table class="ticket-table">
          <colgroup class="ticket-cols"></colgroup>
          <thead><tr id="thead-mvn"></tr></thead>
          <tbody id="tbody-activeMVN"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- 구분선 -->
  <div class="section-divider"></div>

  <!-- 섹션 3: 완료 (기본 접힘) -->
  <section class="ticket-section section-done">
    <div class="section-header collapsible" id="section-done-header">
      <span class="toggle-icon" id="toggle-done">▼</span>
      <span>⚫</span>
      <span data-i18n="section_done">완료</span>
      <span class="count-badge" id="count-done">0</span>
    </div>
    <div id="section-done-body">
      <div class="table-scroll">
        <table class="ticket-table">
          <colgroup class="ticket-cols"></colgroup>
          <thead><tr id="thead-done"></tr></thead>
          <tbody id="tbody-done"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- 섹션 4: 보류/N/A (기본 접힘) -->
  <section class="ticket-section section-hold">
    <div class="section-header collapsible" id="section-hold-header">
      <span class="toggle-icon" id="toggle-hold">▼</span>
      <span>⚪</span>
      <span data-i18n="section_hold">보류 / N/A</span>
      <span class="count-badge" id="count-hold">0</span>
    </div>
    <div id="section-hold-body">
      <div class="table-scroll">
        <table class="ticket-table">
          <colgroup class="ticket-cols"></colgroup>
          <thead><tr id="thead-hold"></tr></thead>
          <tbody id="tbody-hold"></tbody>
        </table>
      </div>
    </div>
  </section>

</main>

</div>


<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/index.js"></script>
</body>
</html>
